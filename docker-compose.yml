services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kleos-api
    restart: unless-stopped
    env_file:
      - ./deploy/.env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - NODE_OPTIONS=--max-old-space-size=512
    expose:
      - "8080"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: kleos-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/kleos.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  uploads_data:
